feeds:
  - name: Hacker News
    url: https://hnrss.org/frontpage
    output_path: docs/feed/hacker-news.xml
    link_url: https://news.ycombinator.com
  - name: DEV Community
    url: https://dev.to/feed
    output_path: docs/feed/dev-community.xml
    link_url: https://dev.to
translator:
  engine: google
  daily_char_limit: 15000  # 省略時は無制限。エンジン問わず1日の翻訳文字数を制限したい場合に設定。

summarizer:
  enabled: true
  engine: claude
  model: us.anthropic.claude-haiku-4-5-20251001-v1:0
  provider: bedrock

output:
  max_items: 200

cache:
  path: cache/translated.json
  http_cache_path: cache/http_cache.json
  char_usage_path: cache/char_usage.json

report:
  output_path: docs/report.html
  items_per_feed: 10
